name: LLM Chat
description: Native SwiftUI chat app for AI models
type: ios
environment:
  ios: "17.0"
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: com.mattypattysapps.llmchat
        XCODE_SCHEME: LLMChat
    scripts:
      - xcode-project build-ipa --project LLMChat.xcodeproj --scheme LLMChat
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration