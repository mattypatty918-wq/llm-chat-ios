# Codemagic CI/CD for llm-chat-ios
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "16.0"
        APP_NAME: "llm-chat-ios"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/llm-chat-ios.git --depth 1
      - cd llm-chat-ios && git submodule update --init --recursive
      - cd llm-chat-ios && xcode-project fetch-dependencies --use-cache
      - cd llm-chat-ios && xcode-project build --workspace LLMChat.xcodeproj --scheme LLMChat --configuration Release
    artifacts:
      - llm-chat-ios/ios/*.ipa
    publishing:
      app_store_connect:
        api_key: Whitefoxes
