# Codemagic CI/CD for LLM Chat (Native SwiftUI)
# App: https://github.com/mattypatty918-wq/llm-chat-ios
# Bundle ID: com.mattypattysapps.llmchat

environment:
  appId: com.mattypattysapps.llmchat
  types:
    - ios
  node: v18

workflows:
  ios-workflow:
    name: iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.mattypattysapps.llmchat"
        XCODE_WORKSPACE: "LLMChat.xcworkspace"
        XCODE_SCHEME: "LLMChat"
        APP_STORE_APP_ID: ""
    triggering:
      events:
        - push
        - tag
      branch-patterns:
        - pattern: master
          include: true
    scripts:
      - cd /Users/builder/clone && ls -la
      - bundle install
      - bundle exec fastlane build
    artifacts:
      - build/*.ipa
    publishing:
      app_store_connect:
        auth: integration