name: LLMChat
options:
  bundleIdPrefix: com.matsimpson
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.matsimpson.llmchat
    DEVELOPMENT_TEAM: 3B3YQ4328X
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Manual
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LLMChat:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matsimpson.llmchat
        DEVELOPMENT_TEAM: 3B3YQ4328X
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.matsimpson.llmchat"
        INFOPLIST_FILE: LLMChat/Info.plist
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual

    sources:
      - path: LLMChat
        excludes:
          - "**/*.md"

    info:
      path: LLMChat/Info.plist
      properties:
        CFBundleDisplayName: Whitefoxes
        CFBundleName: LLMChat
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true   # needed to talk to local gateway IP
        UIRequiresFullScreen: false
